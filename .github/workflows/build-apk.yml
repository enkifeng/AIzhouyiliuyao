name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 安装 Android SDK
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdtools.zip
          mkdir -p $HOME/android-sdk/cmdline-tools
          unzip -q cmdtools.zip -d $HOME/android-sdk/cmdline-tools
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

      - name: 安装平台和构建工具
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: 生成 local.properties
        run: echo "sdk.dir=$HOME/android-sdk" > local.properties

      - name: 构建 APK
        run: |
          sed -i 's/\r//' gradlew
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --info 2>&1
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: 查找生成的 APK
        if: always()
        run: find . -name "*.apk" 2>/dev/null || echo "未找到任何APK文件"

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 六爻AI断卦-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
