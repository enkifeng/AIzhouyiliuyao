name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 准备 SDK 和构建
        run: |
          # 下载 SDK
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmd.zip
          mkdir -p ~/sdk/cmdline-tools
          unzip -q cmd.zip -d ~/sdk/cmdline-tools
          mv ~/sdk/cmdline-tools/cmdline-tools ~/sdk/cmdline-tools/latest
          export ANDROID_HOME=~/sdk
          export PATH=$PATH:~/sdk/cmdline-tools/latest/bin:~/sdk/platform-tools
          
          # 安装平台
          yes | sdkmanager --licenses > /dev/null
          sdkmanager "platforms;android-34" "build-tools;34.0.0"
          
          # 生成 local.properties
          echo "sdk.dir=$HOME/sdk" > local.properties
          
          # 修复换行符并构建
          sed -i 's/\r//' gradlew
          chmod +x gradlew
          
          # 显示项目文件确认
          echo "=== 项目文件 ==="
          ls -la
          echo "=== app/src/main/ ==="
          ls -la app/src/main/
          
          # 构建
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 找 APK
        if: always()
        run: find . -name "*.apk" 2>/dev/null || echo "无APK"

      - name: 上传
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: liuyao-apk
          path: app/build/outputs/apk/debug/app-debug.apk
